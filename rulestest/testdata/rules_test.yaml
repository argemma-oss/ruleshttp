requests:
  - name: allow GET /api/users
    want: allow
    request:
      method: GET
      path: /api/users

  - name: allow POST /api/items
    want: allow
    request:
      method: POST
      path: /api/items

  - name: deny DELETE /api/users
    want: deny
    request:
      method: DELETE
      path: /api/users

  - name: deny GET /internal
    want: deny
    request:
      method: GET
      path: /internal

responses:
  - name: allow 200
    want: allow
    response:
      status_code: 200

  - name: allow 201
    want: allow
    response:
      status_code: 201

  - name: deny 404
    want: deny
    response:
      status_code: 404

  - name: deny 500
    want: deny
    response:
      status_code: 500
